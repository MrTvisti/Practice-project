services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_task_manager_db
    environment:
      POSTGRES_DB: AI_Task_Manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin333
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai_task_network
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_task_manager_backend
    ports:
      - "3000:3000"
    environment:
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: AI_Task_Manager
      DB_PASSWORD: admin333
      DB_PORT: 5432
      PORT: 3000
    depends_on:
      - postgres
    networks:
      - ai_task_network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_task_manager_frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - ai_task_network
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
networks:
  ai_task_network:
    driver: bridge
volumes:
  postgres_data: